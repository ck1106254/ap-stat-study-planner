<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Study Planner — Stats & Physics 1</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EC; --surface: #FFFDF8; --surface2: #F0EDE5;
    --ink: #1A1916; --ink2: #5A5750; --ink3: #9A978F; --rule: #DDD9CF;
    --green: #1D9E75; --green-light: #E1F5EE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* TOP NAV */
  .top-nav {
    background: var(--surface); border-bottom: 1px solid var(--rule);
    padding: 0 28px; display: flex; align-items: stretch;
    position: sticky; top: 0; z-index: 200; height: 56px; gap: 0;
  }
  .app-brand {
    font-family: 'Instrument Serif', serif; font-size: 18px;
    display: flex; align-items: center; padding-right: 20px;
    border-right: 1px solid var(--rule); margin-right: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .app-brand em { font-style: italic; color: #D85A30; }
  .subject-tabs { display: flex; align-items: stretch; }
  .subject-tab {
    display: flex; align-items: center; gap: 9px;
    padding: 0 22px; cursor: pointer;
    border-bottom: 2.5px solid transparent;
    font-size: 13px; font-weight: 500; color: var(--ink3);
    transition: all .15s; white-space: nowrap; user-select: none;
  }
  .subject-tab:hover { color: var(--ink); background: var(--surface2); }
  .subject-tab.active { color: var(--ink); }
  .subject-tab.stats-tab.active  { border-bottom-color: #7F77DD; }
  .subject-tab.physics-tab.active { border-bottom-color: #1D9E75; }
  .tab-pip { width: 8px; height: 8px; border-radius: 50%; }
  .nav-right {
    display: flex; align-items: center; gap: 12px; margin-left: auto;
  }
  .exam-pill {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    color: var(--ink3); background: var(--surface2); border: 1px solid var(--rule);
    padding: 3px 9px; border-radius: 20px; letter-spacing: .4px; white-space: nowrap;
  }
  .progress-bar-outer { width: 100px; height: 3px; background: var(--rule); border-radius: 2px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: var(--green); border-radius: 2px; transition: width .4s; }
  .progress-label { font-size: 11px; color: var(--ink3); font-family: 'DM Mono', monospace; }

  /* SUBJECT PANELS */
  .subject-panel { display: none; }
  .subject-panel.active { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 56px); }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--rule);
    padding: 20px 0; position: sticky; top: 56px;
    height: calc(100vh - 56px); overflow-y: auto;
  }
  .sidebar-week-label {
    font-size: 10px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase;
    color: var(--ink3); padding: 8px 16px 4px; font-family: 'DM Mono', monospace;
  }
  .sidebar-session {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; cursor: pointer; border-radius: 6px;
    margin: 1px 8px; transition: background .15s; font-size: 13px;
    color: var(--ink2); text-decoration: none; position: relative;
  }
  .sidebar-session:hover { background: var(--surface2); color: var(--ink); }
  .sidebar-session.active { background: var(--surface2); color: var(--ink); font-weight: 500; }
  .sidebar-session.active::before {
    content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 3px; border-radius: 0 2px 2px 0;
  }
  .stats-panel  .sidebar-session.active::before { background: #7F77DD; }
  .physics-panel .sidebar-session.active::before { background: #1D9E75; }
  .session-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .session-check {
    width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--rule);
    margin-left: auto; display: flex; align-items: center; justify-content: center;
    font-size: 9px; transition: all .2s; flex-shrink: 0; color: transparent;
  }
  .session-check.done { background: var(--green); border-color: var(--green); color: white; }

  /* MAIN */
  .main { padding: 32px 40px; max-width: 820px; }
  .session-header { margin-bottom: 28px; }
  .week-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 8px; }
  .session-title { font-family: 'Instrument Serif', serif; font-size: 32px; letter-spacing: -.5px; line-height: 1.2; margin-bottom: 8px; }
  .session-meta { display: flex; gap: 16px; align-items: center; font-size: 13px; color: var(--ink3); }
  .skill-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .skill-chip { font-family: 'DM Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }

  /* CARDS */
  .section-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .section-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; border-bottom: 1px solid var(--rule); user-select: none; }
  .section-header:hover { background: var(--surface2); }
  .section-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .section-title-text { font-size: 14px; font-weight: 500; }
  .section-subtitle { font-size: 12px; color: var(--ink3); margin-top: 1px; }
  .section-chevron { margin-left: auto; font-size: 12px; color: var(--ink3); transition: transform .2s; }
  .section-chevron.open { transform: rotate(90deg); }
  .section-body { padding: 20px; display: none; }
  .section-body.open { display: block; }

  /* RESOURCES */
  .resource-list { list-style: none; }
  .resource-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--rule); }
  .resource-item:last-child { border-bottom: none; }
  .resource-type { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--ink3); flex-shrink: 0; margin-top: 2px; }
  .resource-text { font-size: 13px; line-height: 1.5; }
  .resource-text a { color: #4A3FA0; text-decoration: underline; text-underline-offset: 2px; }
  .resource-text a:hover { color: #D85A30; }
  .resource-note { font-size: 12px; color: var(--ink3); margin-top: 2px; }

  /* PROBLEMS */
  .problem { border: 1px solid var(--rule); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .problem-q { padding: 12px 16px; font-size: 14px; line-height: 1.6; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; }
  .problem-q:hover { background: var(--surface2); }
  .problem-number { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: white; background: var(--ink3); width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .problem-type-badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; margin-top: 3px; }
  .mc-badge { background: #E6F1FB; color: #185FA5; }
  .frq-badge { background: #FAECE7; color: #993C1D; }
  .mc-choices { padding: 0 16px 14px 50px; display: none; }
  .mc-choices.open { display: block; }
  .mc-choice { display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: all .15s; }
  .mc-choice:hover { background: var(--surface2); border-color: var(--rule); }
  .mc-choice.correct { background: var(--green-light); border-color: var(--green); }
  .mc-choice.incorrect { background: #FAECE7; border-color: #D85A30; }
  .mc-letter { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; width: 18px; flex-shrink: 0; margin-top: 1px; }
  .answer-section { border-top: 1px solid var(--rule); padding: 14px 16px; background: var(--surface2); display: none; font-size: 13px; line-height: 1.7; }
  .answer-section.open { display: block; }
  .answer-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; color: var(--green); margin-bottom: 6px; }
  .show-answer-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--ink3); background: none; border: 1px solid var(--rule); padding: 5px 12px; border-radius: 6px; cursor: pointer; margin: 8px 0 0 50px; font-family: 'DM Sans', sans-serif; transition: all .15s; }
  .show-answer-btn:hover { background: var(--surface2); color: var(--ink); }
  .frq-body { padding: 12px 16px 14px 50px; display: none; }
  .frq-body.open { display: block; }
  .frq-body ol { padding-left: 18px; font-size: 13px; line-height: 1.8; }
  .tip-box { background: #EEEDFE; border-left: 3px solid #7F77DD; border-radius: 0 8px 8px 0; padding: 12px 16px; font-size: 13px; color: #3C3489; line-height: 1.6; margin-top: 16px; }
  .physics-panel .tip-box { background: #E1F5EE; border-left-color: #1D9E75; color: #085041; }
  .complete-btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 8px; border: 1.5px solid var(--green); background: var(--green-light); color: var(--green); cursor: pointer; transition: all .2s; margin-top: 24px; }
  .complete-btn:hover, .complete-btn.done { background: var(--green); color: white; }

  @media (max-width: 700px) {
    .subject-panel.active { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="app-brand">AP <em>&nbsp;Study</em></div>
  <div class="subject-tabs">
    <div class="subject-tab stats-tab active" onclick="switchSubject('stats')">
      <span class="tab-pip" style="background:#7F77DD"></span>AP Statistics
    </div>
    <div class="subject-tab physics-tab" onclick="switchSubject('physics')">
      <span class="tab-pip" style="background:#1D9E75"></span>AP Physics 1
    </div>
  </div>
  <div class="nav-right">
    <span class="progress-label" id="progress-text">0 of 9 done</span>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:0%"></div></div>
    <span class="exam-pill" id="exam-pill">EXAM MAY 7</span>
  </div>
</nav>

<!-- STATS PANEL -->
<div class="subject-panel stats-panel active" id="panel-stats">
  <nav class="sidebar" id="sidebar-stats"></nav>
  <main class="main" id="main-stats"></main>
</div>

<!-- PHYSICS PANEL -->
<div class="subject-panel physics-panel" id="panel-physics">
  <nav class="sidebar" id="sidebar-physics"></nav>
  <main class="main" id="main-physics"></main>
</div>

<script>
// ─── SUBJECT SWITCHER ──────────────────────────────────────────────────────
let activeSubject = 'stats';
const examDates = { stats: 'EXAM MAY 7', physics: 'EXAM MAY 6' };

function switchSubject(subj) {
  activeSubject = subj;
  document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.' + subj + '-tab').classList.add('active');
  document.querySelectorAll('.subject-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + subj).classList.add('active');
  document.getElementById('exam-pill').textContent = examDates[subj];
  updateProgressBar(subj);
}

// ─── SHARED PROGRESS ──────────────────────────────────────────────────────
let completedStats   = JSON.parse(localStorage.getItem('ap_stats_done')   || '[]');
let completedPhysics = JSON.parse(localStorage.getItem('ap_physics_done') || '[]');

function getCompleted(subj) { return subj === 'stats' ? completedStats : completedPhysics; }

function saveCompleted(subj, arr) {
  if (subj === 'stats') { completedStats = arr; localStorage.setItem('ap_stats_done', JSON.stringify(arr)); }
  else { completedPhysics = arr; localStorage.setItem('ap_physics_done', JSON.stringify(arr)); }
}

function updateProgressBar(subj) {
  const done = getCompleted(subj);
  const total = subj === 'stats' ? statsSessions.length : physicsSessions.length;
  const pct = Math.round(done.length / total * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done.length + ' of ' + total + ' done';
}

// ─── SHARED RENDER HELPERS ────────────────────────────────────────────────
function toggleSection(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}
function toggleChoices(probId) { document.getElementById('choices-' + probId)?.classList.toggle('open'); }
function toggleFRQ(probId) { document.getElementById('frq-' + probId)?.classList.toggle('open'); }
function toggleAnswer(probId) {
  const el = document.getElementById('ans-' + probId);
  el.classList.toggle('open');
  const btn = el.previousElementSibling;
  btn.textContent = el.classList.contains('open') ? 'Hide answer' : 'Show sample answer';
}
function checkAnswer(el) {
  const probId = el.dataset.prob;
  const correct = el.dataset.correct;
  document.querySelectorAll(`[data-prob="${probId}"]`).forEach(c => { c.classList.remove('correct','incorrect'); c.onclick = null; });
  el.classList.add(el.dataset.letter === correct ? 'correct' : 'incorrect');
  document.querySelectorAll(`[data-prob="${probId}"]`).forEach(c => { if (c.dataset.letter === correct) c.classList.add('correct'); });
  document.getElementById('expl-' + probId)?.classList.add('open');
}
function markComplete(subj, id) {
  const arr = getCompleted(subj);
  if (!arr.includes(id)) { arr.push(id); saveCompleted(subj, arr); }
  document.getElementById('complete-btn-' + id)?.classList.add('done');
  document.getElementById('complete-btn-' + id) && (document.getElementById('complete-btn-' + id).textContent = '✓ Session complete');
  document.querySelectorAll('.session-check[data-id="' + id + '"]').forEach(el => { el.classList.add('done'); el.textContent = '✓'; });
  updateProgressBar(subj);
}

function buildSidebar(subj, sessions, weeks) {
  const sidebar = document.getElementById('sidebar-' + subj);
  const done = getCompleted(subj);
  weeks.forEach(w => {
    const lbl = document.createElement('div');
    lbl.className = 'sidebar-week-label';
    lbl.textContent = w.label + ' — ' + w.dates;
    sidebar.appendChild(lbl);
    sessions.filter(s => s.week === w.id).forEach(s => {
      const a = document.createElement('a');
      a.className = 'sidebar-session' + (done.includes(s.id) ? '' : '');
      a.dataset.id = s.id;
      a.href = '#';
      const isDone = done.includes(s.id);
      a.innerHTML = `<span class="session-dot" style="background:${w.mid}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.day}: ${s.title}</span><span class="session-check ${isDone ? 'done' : ''}" data-id="${s.id}">${isDone ? '✓' : ''}</span>`;
      a.addEventListener('click', e => { e.preventDefault(); renderSession(subj, s.id, sessions, weeks); });
      sidebar.appendChild(a);
    });
  });
}

function renderSession(subj, id, sessions, weeks) {
  const s = sessions.find(x => x.id === id);
  const w = weeks.find(x => x.id === s.week);
  document.querySelectorAll('#sidebar-' + subj + ' .sidebar-session').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  const main = document.getElementById('main-' + subj);
  const done = getCompleted(subj);
  const isDone = done.includes(id);

  const skillColorMap = subj === 'stats'
    ? { '1': {light:w.light,color:w.color}, '2': {light:'#E1F5EE',color:'#085041'}, '3': {light:'#FAEEDA',color:'#633806'}, '4': {light:'#FAECE7',color:'#712B13'},'A':{light:'#F1EFE8',color:'#5F5E5A'} }
    : { 'U': {light:w.light,color:w.color} };

  const skillChips = s.skills.map(sk => {
    const key = subj === 'stats' ? sk[0] : 'U';
    const c = skillColorMap[key] || {light:'#F1EFE8',color:'#5F5E5A'};
    return `<span class="skill-chip" style="background:${c.light};color:${c.color}">${sk}</span>`;
  }).join('');

  const resourcesHTML = s.resources.map(r => `
    <li class="resource-item">
      <span class="resource-type">${r.type}</span>
      <div><div class="resource-text">${r.text}</div>${r.note ? `<div class="resource-note">${r.note}</div>` : ''}</div>
    </li>`).join('');

  const problemsHTML = s.problems.map((p, pi) => {
    const pid = subj + '-' + id + '-' + pi;
    if (p.type === 'mc') {
      const choices = p.choices.map(c => `<div class="mc-choice" data-letter="${c.letter}" data-correct="${p.correct}" data-prob="${pid}" onclick="checkAnswer(this)"><span class="mc-letter">${c.letter}</span><span>${c.text}</span></div>`).join('');
      return `<div class="problem">
        <div class="problem-q" onclick="toggleChoices('${pid}')"><span class="problem-number">${p.number}</span><span class="problem-type-badge mc-badge">MC</span><span>${p.q}</span></div>
        <div class="mc-choices" id="choices-${pid}">${choices}</div>
        <div class="answer-section" id="expl-${pid}"><div class="answer-label">Explanation</div><div>${p.explanation}</div></div>
      </div>`;
    } else {
      const parts = p.parts.map((pt,i) => `<li style="margin-bottom:6px">(${String.fromCharCode(97+i)}) ${pt}</li>`).join('');
      const ans = p.answer.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
      return `<div class="problem">
        <div class="problem-q" onclick="toggleFRQ('${pid}')"><span class="problem-number">${p.number}</span><span class="problem-type-badge frq-badge">FRQ</span><span>${p.q}</span></div>
        <div class="frq-body" id="frq-${pid}">
          <ol style="padding-left:18px;margin-bottom:14px;font-size:13px;line-height:1.8">${parts}</ol>
          <button class="show-answer-btn" onclick="toggleAnswer('${pid}')">Show sample answer</button>
          <div class="answer-section" id="ans-${pid}" style="margin-left:-50px;margin-top:10px"><div class="answer-label">Sample Answer</div><p>${ans}</p></div>
        </div>
      </div>`;
    }
  }).join('');

  main.innerHTML = `
    <div class="session-header">
      <div class="week-eyebrow" style="color:${w.mid}">${w.label} · ${s.date}</div>
      <div class="session-title">${s.title}</div>
      <div class="session-meta"><span>⏱ ${s.duration}</span><span style="color:${w.mid}">● ${w.theme}</span></div>
    </div>
    <div class="skill-chips">${skillChips}</div>
    <p style="font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:24px">${s.summary}</p>
    <div class="section-card">
      <div class="section-header" onclick="toggleSection('res-${id}')">
        <div class="section-icon" style="background:${w.light}">📚</div>
        <div><div class="section-title-text">Resources & Khan Academy</div><div class="section-subtitle">${s.resources.length} links for this session</div></div>
        <span class="section-chevron open" id="chev-res-${id}">›</span>
      </div>
      <div class="section-body open" id="res-${id}"><ul class="resource-list">${resourcesHTML}</ul></div>
    </div>
    <div class="section-card">
      <div class="section-header" onclick="toggleSection('probs-${id}')">
        <div class="section-icon" style="background:${w.light}">✏️</div>
        <div><div class="section-title-text">Practice Problems</div><div class="section-subtitle">${s.problems.length} problems · ${s.problems.filter(p=>p.type==='mc').length} MC · ${s.problems.filter(p=>p.type==='frq').length} FRQ</div></div>
        <span class="section-chevron open" id="chev-probs-${id}">›</span>
      </div>
      <div class="section-body open" id="probs-${id}">${problemsHTML}</div>
    </div>
    <div class="tip-box">💡 <strong>Exam tip:</strong> ${s.tip}</div>
    <button class="complete-btn ${isDone ? 'done' : ''}" id="complete-btn-${id}" onclick="markComplete('${subj}','${id}')">
      ${isDone ? '✓ Session complete' : '✓ Mark as complete'}
    </button>`;
}

const statsWeeks = [
  { id: 'w1', label: 'Week 1', color: '#4A3FA0', light: '#EEEDFE', mid: '#7F77DD', dates: 'Apr 17–23', theme: 'Exploring Data + Study Design' },
  { id: 'w2', label: 'Week 2', color: '#B06010', light: '#FAEEDA', mid: '#EF9F27', dates: 'Apr 24–30', theme: 'Probability + Sampling Distributions' },
  { id: 'w3', label: 'Week 3', color: '#A0321A', light: '#FAECE7', mid: '#D85A30', dates: 'May 1–7', theme: 'Significance Tests + Final Review' },
];

const statsSessions = [
  {
    id: 's1', week: 'w1', day: 'Day 1', date: 'Apr 17',
    title: 'Displaying & Describing Data',
    skills: ['1B', '1C', '2A', '2B'],
    duration: '50 min',
    summary: 'Categorical vs. quantitative variables, graphs (dotplot, histogram, boxplot), and describing shape, center, spread, and outliers.',
    resources: [
      { type: 'KA VIDEO', text: '<a href="https://www.khanacademy.org/math/ap-statistics/quantitative-data-ap" target="_blank">Displaying and describing quantitative data</a>', note: 'Start with "Comparing dot plots" through "Describing and comparing distributions"' },
      { type: 'KA VIDEO', text: '<a href="https://www.khanacademy.org/math/ap-statistics/categorical-statistics-ap" target="_blank">Categorical data: one & two variables</a>', note: 'Bar charts, pie charts, two-way tables' },
      { type: 'CB RESOURCE', text: '<a href="https://apcentral.collegeboard.org/courses/ap-statistics" target="_blank">AP Statistics Course & Exam Description</a>', note: 'Pages 30–50 cover Unit 1: Exploring One-Variable Data' },
      { type: 'PRACTICE', text: '<a href="https://www.khanacademy.org/math/ap-statistics/quantitative-data-ap/ap-dotplots-histograms/e/describing-and-comparing-distributions" target="_blank">KA: Comparing distributions exercise set</a>', note: 'Aim for 80%+ before moving on' },
    ],
    problems: [
      {
        type: 'mc', number: 1,
        q: 'A distribution of test scores is described as "right-skewed." Which of the following best describes this distribution?',
        choices: [
          { letter: 'A', text: 'The mean is less than the median' },
